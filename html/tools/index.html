<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Инструменты — RaftForge</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%9A%92%EF%B8%8F%3C/text%3E%3C/svg%3E">
    <style>
        :root {
            --bg: #0e0f12;
            --fg: #e7e9ee;
            --muted: #8b93a3;
            --accent: #ff6a3d;
            --card: #16181d;
            --border: #23262d;
        }

        * { box-sizing: border-box; }

        html, body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: var(--fg);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        a { color: var(--accent); text-decoration: none; }
        a:hover { text-decoration: underline; }

        .topnav {
            display: flex;
            align-items: center;
            gap: 24px;
            padding: 14px 24px;
            background: var(--card);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .topnav .brand-link {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--fg);
            font-weight: 600;
            font-size: 17px;
            text-decoration: none;
            margin-right: auto;
        }
        .topnav .brand-link:hover { text-decoration: none; }
        .topnav-logo {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            background: linear-gradient(135deg, var(--accent), #c2410c);
            display: grid;
            place-items: center;
            color: #fff;
            font-weight: 700;
            font-size: 15px;
        }
        .topnav .nav-links { display: flex; gap: 6px; }
        .topnav .nav-links a {
            color: var(--muted);
            text-decoration: none;
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 15px;
        }
        .topnav .nav-links a:hover {
            color: var(--fg);
            background: rgba(255,255,255,0.04);
            text-decoration: none;
        }
        .topnav .nav-links a.active {
            color: var(--accent);
            background: rgba(255,106,61,0.10);
        }
        .topnav .login-btn {
            color: var(--accent);
            border: 1px solid var(--accent);
            padding: 5px 14px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 14px;
            margin-left: 12px;
        }
        .topnav .login-btn:hover {
            background: rgba(255,106,61,0.10);
            text-decoration: none;
        }
        .topnav { visibility: hidden; }
        @media (max-width: 600px) {
            .topnav { padding: 12px 16px; gap: 12px; }
            .topnav .brand-link span:not(.topnav-logo) { display: none; }
            .topnav .nav-links a { padding: 6px 10px; font-size: 14px; }
        }

        .wrap {
            max-width: 1100px;
            margin: 0 auto;
            padding: 48px 24px;
        }

        h1 {
            font-size: clamp(28px, 4vw, 38px);
            line-height: 1.15;
            letter-spacing: -0.02em;
            margin: 0 0 8px;
        }

        .lede {
            font-size: 16px;
            color: var(--muted);
            margin: 0 0 32px;
        }

        /* Десктопный док инструментов снизу по центру.
           Default — прозрачный фон, видны только ярлыки.
           При hover на сам док — card-фон, читается как панель. */
        .desktop-dock {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 4px;
            padding: 8px 12px 10px;
            border: 1px solid transparent;
            border-bottom: 0;
            border-radius: 12px 12px 0 0;
            background: transparent;
            transition: background 0.18s, border-color 0.18s, padding 0.18s;
            z-index: 9999;
        }
        .desktop-dock:hover {
            background: var(--card);
            border-color: var(--border);
            padding: 12px 16px 14px;
        }
        .toolbar-btn {
            width: 40px;
            height: 40px;
            display: grid;
            place-items: center;
            background: transparent;
            border: 1px solid transparent;
            border-radius: 8px;
            cursor: pointer;
            font-size: 22px;
            line-height: 1;
            color: var(--fg);
            font-family: inherit;
            user-select: none;
            padding: 0;
            transition: background 0.12s, border-color 0.12s;
        }
        .toolbar-btn:hover { background: rgba(255,255,255,0.06); border-color: var(--border); }
        .toolbar-btn:active { transform: scale(0.94); }

        /* Окна */
        .window {
            position: fixed;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            min-width: 320px;
            min-height: 200px;
            overflow: hidden;
        }
        .window.focused { border-color: var(--accent); }
        .window-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 10px;
            background: #1c1f25;
            border-bottom: 1px solid var(--border);
            cursor: move;
            user-select: none;
            flex-shrink: 0;
        }
        .window-title {
            flex: 1;
            font-size: 13px;
            color: var(--fg);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .window-close, .window-max, .window-reload {
            background: transparent;
            color: var(--muted);
            border: 0;
            cursor: pointer;
            font-size: 18px;
            line-height: 1;
            padding: 0 6px;
            border-radius: 4px;
        }
        .window-close:hover, .window-max:hover, .window-reload:hover { color: var(--fg); background: rgba(255, 255, 255, 0.06); }
        .window-max, .window-reload { display: grid; place-items: center; height: 22px; padding: 0 8px; }
        .window-max svg, .window-reload svg { display: block; }
        .window.maximized .window-resize { display: none; }
        .window-body {
            flex: 1;
            position: relative;
            background: #0a0b0d;
            min-height: 0;
        }
        .window-body iframe {
            width: 100%;
            height: 100%;
            border: 0;
            display: block;
        }
        .window-body .empty-placeholder {
            color: var(--muted);
            font-size: 13px;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
        }
        .window-resize {
            position: absolute;
            right: 0;
            bottom: 0;
            width: 16px;
            height: 16px;
            cursor: nwse-resize;
            background:
                linear-gradient(135deg, transparent 50%, var(--muted) 50%, var(--muted) 60%, transparent 60%, transparent 70%, var(--muted) 70%, var(--muted) 80%, transparent 80%);
            opacity: 0.5;
        }
        .window-resize:hover { opacity: 1; }
        /* При drag/resize — отрубаем pointer-events у iframes, иначе они
           съедают mousemove. */
        body.window-dragging iframe { pointer-events: none; }

        /* Мобильный bottom-sheet с кнопками + fullscreen viewer ниже шапки */
        .mobile-bottombar, .mobile-viewer, .mobile-only-msg { display: none; }

        @media (max-width: 768px) {
            .desktop-dock { display: none; }
            .window { display: none; }
            .lede { display: none; }
            .wrap { padding-bottom: 80px; }
            .mobile-only-msg {
                display: block;
                color: var(--muted);
                font-size: 14px;
                margin: 0 0 16px;
            }

            .mobile-bottombar {
                display: block;
                position: fixed;
                left: 0;
                right: 0;
                bottom: 0;
                background: var(--card);
                border-top: 1px solid var(--border);
                z-index: 9999;
                transform: translateY(calc(100% - 40px));
                transition: transform 0.22s ease-out;
                padding-bottom: env(safe-area-inset-bottom);
            }
            .mobile-bottombar.open { transform: translateY(0); }
            .mobile-handle {
                height: 40px;
                display: flex;
                align-items: center;
                justify-content: center;
                cursor: pointer;
                user-select: none;
            }
            .mobile-handle::before {
                content: "";
                width: 44px;
                height: 4px;
                border-radius: 2px;
                background: var(--muted);
                opacity: 0.6;
            }
            .mobile-buttons {
                display: grid;
                grid-template-columns: repeat(4, 1fr);
                gap: 8px;
                padding: 4px 12px 16px;
            }
            .mobile-tool-btn {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 6px;
                padding: 12px 4px;
                background: transparent;
                border: 1px solid var(--border);
                border-radius: 8px;
                color: var(--fg);
                font-family: inherit;
                font-size: 11px;
                cursor: pointer;
            }
            .mobile-tool-btn:active { background: rgba(255,255,255,0.06); }
            .mobile-tool-btn .icon { font-size: 22px; line-height: 1; }

            .mobile-viewer {
                display: none;
                position: fixed;
                left: 0;
                right: 0;
                bottom: 0;
                background: var(--bg);
                z-index: 10000;
            }
            .mobile-viewer.open { display: block; }
            .mobile-viewer iframe {
                width: 100%;
                height: 100%;
                border: 0;
                display: block;
            }
            .mobile-viewer-close {
                position: absolute;
                top: 8px;
                right: 8px;
                width: 36px;
                height: 36px;
                border-radius: 50%;
                background: rgba(0,0,0,0.55);
                color: #fff;
                border: 1px solid var(--border);
                font-size: 22px;
                line-height: 1;
                cursor: pointer;
                z-index: 1;
                display: grid;
                place-items: center;
                padding: 0;
                font-family: inherit;
            }
        }
    </style>
</head>
<body>
    <nav class="topnav">
        <a class="brand-link" href="/">
            <span class="topnav-logo">R</span><span>RaftForge</span>
        </a>
        <div class="nav-links">
            <a href="/">Главная</a>
            <a href="/tools/" class="active" data-nav="tools" hidden>Инструменты</a>
            <a href="/projects" data-nav="projects" hidden>Проекты</a>
            <a href="/system/" data-nav="system" hidden>Система</a>
            <a href="/me/" data-nav="profile" hidden>Кабинет</a>
        </div>
        <a class="login-btn" id="login-btn" href="https://auth.raftforge.art/login" hidden>Войти</a>
    </nav>
    <script>
    (function(){
        var nav = document.querySelector(".topnav");
        var btn = document.getElementById("login-btn");
        if (btn) {
            btn.href = "https://auth.raftforge.art/login?next=" + encodeURIComponent(location.href);
        }
        // service-name → required resource. Должно совпадать с window.__TOOLS_SERVICES.
        var SERVICE_RES = { notes: "notes-dev", diary: "diary-dev", board: "board-dev", docs: "docs-dev" };
        function applyState(d) {
            // Топ-нав: показ табов по whoami.nav + login-кнопка.
            document.querySelectorAll(".topnav [data-nav]").forEach(function(e){
                var key = e.getAttribute("data-nav");
                var visible = false;
                if (key === "profile") visible = !!(d && d.authenticated);
                else visible = !!(d && d.nav && d.nav[key]);
                if (visible) e.removeAttribute("hidden"); else e.setAttribute("hidden", "");
            });
            if (btn) {
                if (d && d.authenticated) btn.setAttribute("hidden", "");
                else btn.removeAttribute("hidden");
            }
            // Фильтр иконок инструментов: оставить только те, к которым есть resource
            // (куратор видит все). Скрываем и dock-кнопки, и mobile-кнопки.
            var resources = (d && d.resources) || [];
            var isCurator = !!(d && d.is_curator);
            document.querySelectorAll("[data-service]").forEach(function(el){
                var svc = el.getAttribute("data-service");
                var res = SERVICE_RES[svc];
                var ok = isCurator || (res && resources.indexOf(res) !== -1);
                el.style.display = ok ? "" : "none";
            });
        }
        function reveal() { if (nav) nav.style.visibility = "visible"; }

        var lastVersion = null;
        function fetchWhoami() {
            return fetch("/auth/whoami", { credentials: "include", cache: "no-store" })
                .then(function(r){ return r.ok ? r.json() : { authenticated: false, version: "anon" }; })
                .catch(function(){ return { authenticated: false, version: "anon" }; });
        }
        fetchWhoami().then(function(d){ lastVersion = d.version; applyState(d); reveal(); });

        var inflight = false;
        function recheck() {
            if (inflight) return;
            inflight = true;
            fetchWhoami().then(function(d){
                inflight = false;
                if (lastVersion !== null && d.version !== lastVersion) {
                    location.reload();
                } else {
                    lastVersion = d.version;
                    applyState(d);
                }
            });
        }
        document.addEventListener("click", recheck, true);
        document.addEventListener("submit", recheck, true);
        document.addEventListener("visibilitychange", function(){
            if (document.visibilityState === "visible") recheck();
        });
    })();
    </script>

    <div class="wrap">
        <h1>Инструменты</h1>
        <p class="lede">Запустите сервис в плавающем окне. Окна можно двигать, ресайзить и открывать несколько одновременно.</p>

        <p class="mobile-only-msg">Откройте панель внизу и выберите инструмент.</p>

    <div class="mobile-bottombar" id="mobile-bottombar" aria-label="Панель инструментов">

    <div class="desktop-dock" id="desktop-dock" aria-label="Панель инструментов">
        <button class="toolbar-btn" data-service="notes" type="button" title="Заметки">📝</button>
        <button class="toolbar-btn" data-service="diary" type="button" title="Дневник">📔</button>

        <button class="toolbar-btn" data-service="docs" type="button" title="Документы">📄</button>
    </div>

    <script>
    window.__TOOLS_SERVICES = {
        notes: { title: "Заметки",   url: "https://notes.dev.raftforge.art/" },
        diary: { title: "Дневник",   url: "https://diary.dev.raftforge.art/" },
        board: { title: "Доска",     url: "https://board.dev.raftforge.art/" },
        docs:  { title: "Документы", url: "https://docs.dev.raftforge.art/" }
    };
    </script>

    <script>
    (function(){
        if (window.matchMedia("(max-width: 768px)").matches) return;

        var SERVICES = window.__TOOLS_SERVICES;

        var DEFAULT_W = 1024;
        var DEFAULT_H = 680;
        var CASCADE_STEP = 30;

        var ICON_MAX = '<svg width="10" height="10" viewBox="0 0 10 10" aria-hidden="true"><rect x="0.5" y="0.5" width="9" height="9" fill="none" stroke="currentColor"/></svg>';
        var ICON_RESTORE = '<svg width="10" height="10" viewBox="0 0 10 10" aria-hidden="true"><rect x="2.5" y="0.5" width="7" height="7" fill="none" stroke="currentColor"/><rect x="0.5" y="2.5" width="7" height="7" fill="#1c1f25" stroke="currentColor"/></svg>';
        var ICON_RELOAD = '<svg width="12" height="12" viewBox="0 0 12 12" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.5 6a4.5 4.5 0 1 1-1.32-3.18"/><polyline points="10.5 1.5 10.5 4.5 7.5 4.5"/></svg>';

        var zCounter = 100;
        var openCount = 0;
        var focusedEl = null;
        var navEl = document.querySelector(".topnav");
        function navBottom() { return navEl ? navEl.getBoundingClientRect().bottom : 0; }
        // Ширина видимой полоски-триггера слева. Развёрнутое окно её обходит,
        // иначе trigger (z-index:9999) перекрывает левый край окна.
        function triggerWidth() {
            var el = document.getElementById("toolbar-trigger");
            return el ? el.getBoundingClientRect().width : 0;
        }
        // Высота dock'а внизу — окно не должно под него залазить.
        // Берём свёрнутую высоту (без hover-расширения) чтобы при hover
        // dock на мгновение не подскакивал поверх контента.
        var dockEl = document.getElementById("desktop-dock");
        function dockHeight() { return dockEl ? dockEl.getBoundingClientRect().height : 0; }

        function bringToFront(win) {
            zCounter += 1;
            win.style.zIndex = String(zCounter);
            if (focusedEl && focusedEl !== win) focusedEl.classList.remove("focused");
            focusedEl = win;
            win.classList.add("focused");
        }

        function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

        // --- persistence ---
        var STORAGE_KEY = "tools.windows.v1";
        var restoring = false; // подавляет saveState во время восстановления
        function saveState() {
            if (restoring) return;
            try {
                var wins = document.querySelectorAll(".window");
                var arr = [];
                wins.forEach(function(win){
                    var svc = win.dataset.service;
                    if (!svc) return;
                    var maximized = win.classList.contains("maximized");
                    var rect;
                    if (maximized) {
                        // У maximized окна в DOM текущие coords — fullscreen.
                        // Сохраняем restore-координаты из dataset.
                        rect = {
                            left: parseFloat(win.dataset.prevLeft),
                            top: parseFloat(win.dataset.prevTop),
                            width: parseFloat(win.dataset.prevWidth),
                            height: parseFloat(win.dataset.prevHeight),
                        };
                        if (isNaN(rect.left)) return; // без prevRect максимизация невалидна — пропускаем
                    } else {
                        var r = win.getBoundingClientRect();
                        rect = { left: r.left, top: r.top, width: r.width, height: r.height };
                    }
                    arr.push({
                        service: svc,
                        left: Math.round(rect.left),
                        top: Math.round(rect.top),
                        width: Math.round(rect.width),
                        height: Math.round(rect.height),
                        maximized: maximized,
                    });
                });
                localStorage.setItem(STORAGE_KEY, JSON.stringify(arr));
            } catch (e) {}
        }
        function loadState() {
            try {
                var raw = localStorage.getItem(STORAGE_KEY);
                if (!raw) return;
                var arr = JSON.parse(raw);
                if (!Array.isArray(arr)) return;
                restoring = true;
                arr.forEach(function(s){
                    if (!s || !SERVICES[s.service]) return;
                    var win = makeWindow(s.service, s);
                });
                restoring = false;
                saveState(); // sync на случай если что-то отсеялось
            } catch (e) { restoring = false; }
        }

        function makeWindow(serviceId, restore) {
            var svc = SERVICES[serviceId];
            if (!svc) return;

            var win = document.createElement("div");
            win.className = "window";
            win.dataset.service = serviceId;

            var navH = navBottom();
            var dockH = dockHeight();
            var maxH = window.innerHeight - navH - dockH - 20;
            var w, h, left, top;
            if (restore) {
                // Клампим под текущий viewport — на случай если он стал уже.
                w = clamp(restore.width, 320, window.innerWidth - 40);
                h = clamp(restore.height, 200, maxH);
                left = clamp(restore.left, 8, Math.max(8, window.innerWidth - w - 8));
                top = clamp(restore.top, navH + 4, Math.max(navH + 4, window.innerHeight - dockH - h - 8));
            } else {
                w = clamp(DEFAULT_W, 320, window.innerWidth - 40);
                h = clamp(DEFAULT_H, 200, maxH);
                // Центрируем первое, для следующих cascade.
                var offset = (openCount % 6) * CASCADE_STEP;
                left = clamp((window.innerWidth - w) / 2 + offset, 8, window.innerWidth - w - 8);
                top = clamp(navH + 4 + offset, navH + 4, window.innerHeight - dockH - h - 8);
            }
            win.style.left = left + "px";
            win.style.top = top + "px";
            win.style.width = w + "px";
            win.style.height = h + "px";

            var header = document.createElement("div");
            header.className = "window-header";
            var title = document.createElement("span");
            title.className = "window-title";
            title.textContent = svc.title;
            var reloadBtn = document.createElement("button");
            reloadBtn.className = "window-reload";
            reloadBtn.type = "button";
            reloadBtn.title = "Перезагрузить";
            reloadBtn.innerHTML = ICON_RELOAD;
            var maxBtn = document.createElement("button");
            maxBtn.className = "window-max";
            maxBtn.type = "button";
            maxBtn.title = "Развернуть";
            maxBtn.innerHTML = ICON_MAX;
            var closeBtn = document.createElement("button");
            closeBtn.className = "window-close";
            closeBtn.type = "button";
            closeBtn.title = "Закрыть";
            closeBtn.textContent = "×";
            header.appendChild(title);
            header.appendChild(reloadBtn);
            header.appendChild(maxBtn);
            header.appendChild(closeBtn);

            var body = document.createElement("div");
            body.className = "window-body";
            if (svc.url) {
                var iframe = document.createElement("iframe");
                iframe.src = svc.url;
                iframe.allow = "clipboard-read; clipboard-write; fullscreen";
                body.appendChild(iframe);
            } else {
                var ph = document.createElement("div");
                ph.className = "empty-placeholder";
                ph.textContent = "(пусто)";
                body.appendChild(ph);
            }

            var resize = document.createElement("div");
            resize.className = "window-resize";

            win.appendChild(header);
            win.appendChild(body);
            win.appendChild(resize);
            document.body.appendChild(win);

            openCount += 1;
            bringToFront(win);

            // --- focus on click (+ передаём фокус в iframe для keyboard) ---
            win.addEventListener("mousedown", function(){
                bringToFront(win);
                var ifr = win.querySelector("iframe");
                if (ifr) try { ifr.contentWindow.focus(); } catch (e) {}
            }, true);

            // --- close ---
            closeBtn.addEventListener("click", function(e){
                e.stopPropagation();
                win.remove();
                saveState();
            });

            // --- reload (переустанавливаем src, т.к. cross-origin .reload() заблокирован) ---
            reloadBtn.addEventListener("click", function(e){
                e.stopPropagation();
                var ifr = win.querySelector("iframe");
                if (ifr) ifr.src = ifr.src;
            });

            // --- maximize / restore (prevRect живёт в dataset — чтобы saveState мог читать) ---
            function applyMaximized() {
                var navH = navBottom();
                var dockH = dockHeight();
                var tw = triggerWidth();
                win.style.left = tw + "px";
                win.style.top = navH + "px";
                win.style.width = (window.innerWidth - tw) + "px";
                win.style.height = (window.innerHeight - navH - dockH) + "px";
            }
            function toggleMax() {
                if (win.classList.contains("maximized")) {
                    win.style.left = win.dataset.prevLeft + "px";
                    win.style.top = win.dataset.prevTop + "px";
                    win.style.width = win.dataset.prevWidth + "px";
                    win.style.height = win.dataset.prevHeight + "px";
                    win.classList.remove("maximized");
                    maxBtn.innerHTML = ICON_MAX;
                    maxBtn.title = "Развернуть";
                } else {
                    var rect = win.getBoundingClientRect();
                    win.dataset.prevLeft = String(Math.round(rect.left));
                    win.dataset.prevTop = String(Math.round(rect.top));
                    win.dataset.prevWidth = String(Math.round(rect.width));
                    win.dataset.prevHeight = String(Math.round(rect.height));
                    applyMaximized();
                    win.classList.add("maximized");
                    maxBtn.innerHTML = ICON_RESTORE;
                    maxBtn.title = "Уменьшить";
                }
                bringToFront(win);
                saveState();
            }
            maxBtn.addEventListener("click", function(e){
                e.stopPropagation();
                toggleMax();
            });
            // Двойной клик по шапке = toggle maximize/restore (Windows-style).
            header.addEventListener("dblclick", function(e){
                if (e.target === closeBtn || e.target === maxBtn || maxBtn.contains(e.target)) return;
                e.preventDefault();
                toggleMax();
            });
            // Подгоняем размер развёрнутого окна при ресайзе viewport.
            window.addEventListener("resize", function(){
                if (win.classList.contains("maximized") && document.body.contains(win)) applyMaximized();
            });

            // --- drag (с поддержкой drag-to-restore из maximized) ---
            header.addEventListener("mousedown", function(e){
                if (e.target === closeBtn || e.target === maxBtn || maxBtn.contains(e.target)) return;
                e.preventDefault();
                bringToFront(win);
                var startX = e.clientX, startY = e.clientY;
                var rect = win.getBoundingClientRect();
                var startLeft = rect.left, startTop = rect.top;
                var wasMaximized = win.classList.contains("maximized");
                var restored = false;
                // Доля курсора по горизонтали внутри maximized-окна — чтобы после
                // restore шапка оказалась под курсором в той же пропорции.
                var ratioX = wasMaximized && rect.width > 0 ? (startX - rect.left) / rect.width : 0;
                document.body.classList.add("window-dragging");
                function onMove(ev){
                    if (wasMaximized && !restored) {
                        if (Math.abs(ev.clientX - startX) < 5 && Math.abs(ev.clientY - startY) < 5) return;
                        toggleMax(); // restore из dataset
                        var nw = parseFloat(win.dataset.prevWidth) || rect.width;
                        var newLeft = ev.clientX - ratioX * nw;
                        var newTop = Math.max(navBottom(), ev.clientY - 10);
                        win.style.left = newLeft + "px";
                        win.style.top = newTop + "px";
                        startLeft = newLeft;
                        startTop = newTop;
                        startX = ev.clientX;
                        startY = ev.clientY;
                        rect = win.getBoundingClientRect();
                        restored = true;
                        return;
                    }
                    var nx = clamp(startLeft + (ev.clientX - startX), -rect.width + 80, window.innerWidth - 80);
                    var ny = clamp(startTop + (ev.clientY - startY), navBottom(), window.innerHeight - dockHeight() - 30);
                    win.style.left = nx + "px";
                    win.style.top = ny + "px";
                }
                function onUp(){
                    document.removeEventListener("mousemove", onMove);
                    document.removeEventListener("mouseup", onUp);
                    document.body.classList.remove("window-dragging");
                    saveState();
                }
                document.addEventListener("mousemove", onMove);
                document.addEventListener("mouseup", onUp);
            });

            // --- resize ---
            resize.addEventListener("mousedown", function(e){
                if (win.classList.contains("maximized")) return;
                e.preventDefault();
                e.stopPropagation();
                bringToFront(win);
                var startX = e.clientX, startY = e.clientY;
                var rect = win.getBoundingClientRect();
                var startW = rect.width, startH = rect.height;
                document.body.classList.add("window-dragging");
                function onMove(ev){
                    var nw = clamp(startW + (ev.clientX - startX), 320, window.innerWidth - rect.left - 8);
                    var nh = clamp(startH + (ev.clientY - startY), 200, window.innerHeight - rect.top - dockHeight() - 8);
                    win.style.width = nw + "px";
                    win.style.height = nh + "px";
                }
                function onUp(){
                    document.removeEventListener("mousemove", onMove);
                    document.removeEventListener("mouseup", onUp);
                    document.body.classList.remove("window-dragging");
                    saveState();
                }
                document.addEventListener("mousemove", onMove);
                document.addEventListener("mouseup", onUp);
            });

            // Восстановление maximized-состояния — после полного создания окна.
            if (restore && restore.maximized) {
                toggleMax();
            }

            saveState();
            return win;
        }

        // dock click handlers — открывают сервис в плавающем окне
        document.querySelectorAll(".desktop-dock .toolbar-btn").forEach(function(btn){
            btn.addEventListener("click", function(){
                makeWindow(btn.getAttribute("data-service"));
            });
        });

        // Восстанавливаем ранее открытые окна (только desktop — на mobile другой UI).
        if (!window.matchMedia("(max-width: 768px)").matches) {
            loadState();
        }

        // Если фокус остался на parent (raftforge.art) — пересылаем keydown в
        // активное окно-iframe через postMessage. Cross-origin iframe сам события
        // клавиатуры от parent не получает.
        window.addEventListener("keydown", function(e){
            if (!focusedEl) return;
            var ae = document.activeElement;
            // Forward только если фокус "болтается" в parent body (а не на input/button parent
            // и не на самом iframe — там native keydown пройдёт сам без двойного срабатывания).
            if (ae !== document.body) return;
            var ifr = focusedEl.querySelector("iframe");
            if (!ifr || !ifr.contentWindow) return;
            ifr.contentWindow.postMessage({
                __toolsKey: true,
                key: e.key, code: e.code,
                ctrlKey: e.ctrlKey, shiftKey: e.shiftKey, metaKey: e.metaKey, altKey: e.altKey,
            }, "*");
        }, true);
    })();
    </script>

    <script>
    // Мобильная ветка: bottom-sheet (тап по handle = toggle) + fullscreen iframe ниже шапки.
    (function(){
        if (!window.matchMedia("(max-width: 768px)").matches) return;

        var SERVICES = window.__TOOLS_SERVICES;
        var bottombar = document.getElementById("mobile-bottombar");
        var handle = document.getElementById("mobile-handle");
        var viewer = document.getElementById("mobile-viewer");
        var viewerIframe = document.getElementById("mobile-viewer-iframe");
        var viewerClose = document.getElementById("mobile-viewer-close");
        var navEl = document.querySelector(".topnav");

        function navHeight() { return navEl ? navEl.getBoundingClientRect().height : 0; }

        function placeViewer() { viewer.style.top = navHeight() + "px"; }

        handle.addEventListener("click", function(e){
            e.stopPropagation();
            bottombar.classList.toggle("open");
        });

        document.addEventListener("click", function(e){
            if (bottombar.classList.contains("open") && !bottombar.contains(e.target)) {
                bottombar.classList.remove("open");
            }
        });

        bottombar.querySelectorAll(".mobile-tool-btn").forEach(function(btn){
            btn.addEventListener("click", function(e){
                e.stopPropagation();
                var svc = SERVICES[btn.getAttribute("data-service")];
                if (!svc) return;
                placeViewer();
                viewerIframe.src = svc.url;
                viewer.classList.add("open");
                viewer.setAttribute("aria-hidden", "false");
                bottombar.classList.remove("open");
                document.body.style.overflow = "hidden";
            });
        });

        viewerClose.addEventListener("click", function(){
            viewer.classList.remove("open");
            viewer.setAttribute("aria-hidden", "true");
            viewerIframe.src = "about:blank";
            document.body.style.overflow = "";
        });

        window.addEventListener("resize", function(){
            if (viewer.classList.contains("open")) placeViewer();
        });
    })();
    </script>

    <!-- ── DEBUG PANEL (временно, для диагностики мобильного зума) ── -->
    <div id="rfd-debug" style="
        position:fixed;left:8px;right:8px;bottom:8px;z-index:99999;
        background:rgba(0,0,0,0.92);color:#0f0;
        font:11px/1.35 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
        padding:8px 10px;border-radius:8px;
        max-height:50vh;overflow:auto;
        white-space:pre-wrap;word-break:break-all;
        border:1px solid #0f0;">init…</div>
    <button id="rfd-refresh" style="
        position:fixed;right:8px;bottom:calc(50vh + 12px);z-index:99999;
        background:#0f0;color:#000;border:0;border-radius:4px;
        padding:4px 8px;font:12px sans-serif;cursor:pointer;">↻ refresh debug</button>
    <button id="rfd-close" style="
        position:fixed;right:80px;bottom:calc(50vh + 12px);z-index:99999;
        background:#f55;color:#fff;border:0;border-radius:4px;
        padding:4px 8px;font:12px sans-serif;cursor:pointer;">× hide</button>
    <script>
    (function(){
        var box = document.getElementById('rfd-debug');
        function n(v){ return v === undefined || v === null ? '—' : Math.round(v*100)/100; }
        function dump(){
            var d = document.documentElement;
            var b = document.body;
            var vv = window.visualViewport || {};
            var overflowingEls = [];
            var vw = window.innerWidth;
            // Найти первые 10 элементов с шириной > viewport.
            var all = document.querySelectorAll('*');
            for (var i = 0; i < all.length && overflowingEls.length < 10; i++) {
                var el = all[i];
                var r = el.getBoundingClientRect();
                if (r.width > vw + 0.5) {
                    overflowingEls.push(
                        '· <' + el.tagName.toLowerCase() +
                        (el.id ? '#'+el.id : '') +
                        (el.className && typeof el.className === 'string' ? '.'+el.className.split(' ').slice(0,2).join('.') : '') +
                        '> w=' + n(r.width)
                    );
                }
            }
            var info = [
                'TIME ' + new Date().toLocaleTimeString(),
                '',
                'WINDOW',
                '  innerWidth  = ' + n(window.innerWidth),
                '  innerHeight = ' + n(window.innerHeight),
                '  devicePixelRatio = ' + n(window.devicePixelRatio),
                '',
                'VISUAL VIEWPORT',
                '  width  = ' + n(vv.width),
                '  height = ' + n(vv.height),
                '  scale  = ' + n(vv.scale),
                '  offsetTop/Left = ' + n(vv.offsetTop) + ' / ' + n(vv.offsetLeft),
                '',
                'HTML <html>',
                '  clientWidth/Height  = ' + n(d.clientWidth) + ' × ' + n(d.clientHeight),
                '  scrollWidth/Height  = ' + n(d.scrollWidth) + ' × ' + n(d.scrollHeight),
                '  offsetWidth/Height  = ' + n(d.offsetWidth) + ' × ' + n(d.offsetHeight),
                '',
                'BODY',
                '  clientWidth = ' + n(b.clientWidth),
                '  scrollWidth = ' + n(b.scrollWidth),
                '  offsetWidth = ' + n(b.offsetWidth),
                '',
                'SCREEN',
                '  width × height = ' + n(screen.width) + ' × ' + n(screen.height),
                '  avail = ' + n(screen.availWidth) + ' × ' + n(screen.availHeight),
                '  orientation = ' + (screen.orientation ? screen.orientation.type : '—'),
                '',
                'VIEWPORT META',
                '  ' + (document.querySelector('meta[name=viewport]') ? document.querySelector('meta[name=viewport]').content : '— нет тега —'),
                '',
                'OVERFLOWING ELEMENTS (>vw=' + n(vw) + ')',
                overflowingEls.length ? overflowingEls.join('\n') : '  (нет — контент шириной не выходит за viewport)',
                '',
                'UA',
                '  ' + navigator.userAgent,
                '',
                'ZOOM ESTIMATE',
                '  ratio = clientWidth/innerWidth = ' + n(d.clientWidth / window.innerWidth),
                '  (≈1.0 — без зума; >1 — auto-zoom-out applied)',
            ].join('\n');
            box.textContent = info;
        }
        dump();
        window.addEventListener('resize', dump);
        window.addEventListener('orientationchange', dump);
        if (window.visualViewport) {
            window.visualViewport.addEventListener('resize', dump);
            window.visualViewport.addEventListener('scroll', dump);
        }
        document.getElementById('rfd-refresh').onclick = dump;
        document.getElementById('rfd-close').onclick = function(){
            box.style.display = 'none';
            document.getElementById('rfd-refresh').style.display = 'none';
            this.style.display = 'none';
        };
    })();
    </script>
