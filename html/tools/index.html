<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Инструменты — RaftForge</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%9A%92%EF%B8%8F%3C/text%3E%3C/svg%3E">
    <style>
        :root {
            --bg: #0e0f12;
            --fg: #e7e9ee;
            --muted: #8b93a3;
            --accent: #ff6a3d;
            --card: #16181d;
            --border: #23262d;
        }

        * { box-sizing: border-box; }

        html, body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: var(--fg);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        a { color: var(--accent); text-decoration: none; }
        a:hover { text-decoration: underline; }

        .topnav {
            display: flex;
            align-items: center;
            gap: 24px;
            padding: 14px 24px;
            background: var(--card);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .topnav .brand-link {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--fg);
            font-weight: 600;
            font-size: 17px;
            text-decoration: none;
            margin-right: auto;
        }
        .topnav .brand-link:hover { text-decoration: none; }
        .topnav-logo {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            background: linear-gradient(135deg, var(--accent), #c2410c);
            display: grid;
            place-items: center;
            color: #fff;
            font-weight: 700;
            font-size: 15px;
        }
        .topnav .nav-links { display: flex; gap: 6px; }
        .topnav .nav-links a {
            color: var(--muted);
            text-decoration: none;
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 15px;
        }
        .topnav .nav-links a:hover {
            color: var(--fg);
            background: rgba(255,255,255,0.04);
            text-decoration: none;
        }
        .topnav .nav-links a.active {
            color: var(--accent);
            background: rgba(255,106,61,0.10);
        }
        @media (max-width: 600px) {
            .topnav { padding: 12px 16px; gap: 12px; }
            .topnav .brand-link span:not(.topnav-logo) { display: none; }
            .topnav .nav-links a { padding: 6px 10px; font-size: 14px; }
        }

        .wrap {
            max-width: 760px;
            margin: 0 auto;
            padding: 64px 24px;
        }

        h1 {
            font-size: clamp(32px, 5vw, 48px);
            line-height: 1.15;
            letter-spacing: -0.02em;
            margin: 0 0 20px;
        }

        .lede {
            font-size: 18px;
            color: var(--muted);
            margin: 0 0 48px;
            max-width: 560px;
        }
    </style>
</head>
<body>
    <nav class="topnav">
        <a class="brand-link" href="/">
            <span class="topnav-logo">R</span><span>RaftForge</span>
        </a>
        <div class="nav-links">
            <a href="/">Главная</a>
            <a href="/tools/" class="active">Инструменты</a>
            <a href="/projects">Проекты</a>
        </div>
    </nav>

    <div class="wrap">
        <h1>Инструменты</h1>
        <p class="lede">Раздел в работе.</p>
    </div>
</body>
</html>
