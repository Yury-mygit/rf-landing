<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>RaftForge</title>
    <meta name="description" content="RaftForge — личная мастерская инструментов: LiveNotes, удалённое управление и другие сервисы.">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%9A%92%EF%B8%8F%3C/text%3E%3C/svg%3E">
    <style>
        :root {
            --bg: #0e0f12;
            --fg: #e7e9ee;
            --muted: #8b93a3;
            --accent: #ff6a3d;
            --card: #16181d;
            --border: #23262d;
        }

        * { box-sizing: border-box; }

        html, body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: var(--fg);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        .wrap {
            max-width: 760px;
            margin: 0 auto;
            padding: 80px 24px 64px;
        }

        header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 48px;
        }

        .logo {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            background: linear-gradient(135deg, var(--accent), #c2410c);
            display: grid;
            place-items: center;
            font-weight: 700;
            color: #fff;
            font-size: 18px;
        }

        .brand {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: -0.01em;
        }

        h1 {
            font-size: clamp(32px, 5vw, 48px);
            line-height: 1.15;
            letter-spacing: -0.02em;
            margin: 0 0 20px;
        }

        h1 .accent { color: var(--accent); }

        .lede {
            font-size: 18px;
            color: var(--muted);
            margin: 0 0 48px;
            max-width: 560px;
        }

        footer {
            color: var(--muted);
            font-size: 13px;
            border-top: 1px solid var(--border);
            padding-top: 24px;
            margin-top: 48px;
        }
    </style>
</head>
<body>
    <div class="wrap">
        <header>
            <div class="logo">R</div>
            <div class="brand">RaftForge</div>
        </header>

        <h1>Личная <span class="accent">мастерская</span> инструментов.</h1>
        <p class="lede">
            Небольшой набор сервисов, которые я делаю под себя: заметки с распознаванием речи,
            удалённое управление сервером, доска идей, прокси — собрано из любопытства и для удобства.
        </p>

        <footer>
            © 2026 RaftForge · <span style="opacity:.5">deploy v0.1.2test</span>
        </footer>
    </div>
</body>
</html>
