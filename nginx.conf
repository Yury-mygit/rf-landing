server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    location = /healthz {
        access_log off;
        return 200 "ok\n";
    }

    gzip on;
    gzip_types text/plain text/css application/javascript image/svg+xml;
}
